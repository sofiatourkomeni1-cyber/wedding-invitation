<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Δήμητρα & Γιάννης</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
background:#eaf2fb;
overflow:hidden;
}

/* envelope screen */

.envelope-screen{

position:fixed;
width:100%;
height:100vh;
background:#e5d7bd;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;
perspective:1200px;

}

/* envelope */

.envelope{

width:100%;
height:100%;
position:relative;

}

/* flap */

.flap{

position:absolute;
top:0;

width:100%;
height:50%;

background:#d8c7a5;

clip-path:polygon(0 0,100% 0,50% 100%);

transform-origin:top;
transition:1.2s;

box-shadow:0 10px 20px rgba(0,0,0,0.2);

}

.open .flap{

transform:rotateX(180deg);

}

/* invitation card */

.invitation{

position:absolute;

top:130%;
left:50%;

transform:translateX(-50%);

width:720px;
max-width:90%;

opacity:0;

transition:1.4s ease;

filter:drop-shadow(0 20px 30px rgba(0,0,0,0.3));

}

.show .invitation{

top:50%;
transform:translate(-50%,-50%);
opacity:1;

}

/* buttons */

.buttons{

position:absolute;
bottom:80px;
left:50%;

transform:translateX(-50%);

display:flex;
gap:20px;

}

.btn{

padding:14px 26px;

border-radius:30px;

border:none;

background:rgba(255,255,255,0.8);

backdrop-filter:blur(6px);

font-size:18px;

cursor:pointer;

box-shadow:0 6px 18px rgba(0,0,0,0.15);

transition:.3s;

}

.btn:hover{

transform:translateY(-3px);

}

/* petals */

.petal{

position:fixed;
top:-40px;

pointer-events:none;

animation:fall linear forwards;

}

@keyframes fall{

to{

transform:translateY(110vh) rotate(360deg);

}

}

/* mobile */

@media(max-width:600px){

.buttons{

flex-direction:column;
bottom:40px;

}

}

</style>

</head>

<body>

<div id="screen" class="envelope-screen" onclick="openEnvelope()">

<div class="envelope">

<div class="flap"></div>

<img class="invitation" src="invitation.png">

</div>

</div>


<div class="buttons">

<button class="btn" onclick="window.open('https://maps.google.com')">
📍 Χάρτης
</button>

<button class="btn" onclick="window.location='iban.html'">
🎁 Δώρο
</button>

</div>


<script>

/* open envelope */

function openEnvelope(){

document.getElementById("screen").classList.add("open");

setTimeout(()=>{

document.getElementById("screen").classList.add("show");

startPetals();

},800)

}

/* falling blue petals */

function startPetals(){

setInterval(()=>{

let petal=document.createElement("img");

petal.className="petal";

petal.src="blue-petal.png";

petal.style.left=Math.random()*100+"vw";

petal.style.width=18+Math.random()*22+"px";

petal.style.animationDuration=4+Math.random()*5+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),9000);

},250)

}

</script>

</body>
</html>
