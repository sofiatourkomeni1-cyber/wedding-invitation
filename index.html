<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Πρόσκληση</title>

<style>

body{
margin:0;
font-family:Georgia, serif;
background:#eaf2fb;
overflow-x:hidden;
}

/* envelope screen */

.start-screen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.envelope{
width:220px;
height:150px;
background:#e3d4b6;
position:relative;
cursor:pointer;
border-radius:6px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.envelope:before{
content:"";
position:absolute;
top:-75px;
left:0;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-bottom:75px solid #d6c6a7;
transition:1s;
transform-origin:bottom;
}

.open .envelope:before{
transform:rotateX(180deg);
}

.open-btn{
margin-top:30px;
padding:14px 26px;
border:none;
background:#2f4f8f;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

/* invitation */

.invitation{
display:none;
max-width:700px;
margin:40px auto;
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:slideUp 1.2s ease;
}

@keyframes slideUp{

from{
transform:translateY(200px);
opacity:0;
}

to{
transform:translateY(0);
opacity:1;
}

}

h1{
color:#2f4f8f;
}

.names{
font-size:32px;
color:#2f4f8f;
margin:20px;
}

/* buttons */

.buttons{
margin-top:30px;
}

.map-btn, .gift-btn{

padding:14px 24px;
margin:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

.map-btn{
background:#2f4f8f;
color:white;
}

.gift-btn{
background:#d4b35e;
color:white;
}

/* falling flowers */

.flower{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

/* mobile */

@media(max-width:600px){

.invitation{
margin:20px;
padding:25px;
}

.names{
font-size:26px;
}

}

</style>
</head>

<body>

<div id="start" class="start-screen">

<div class="envelope"></div>

<button class="open-btn" onclick="openEnvelope()">
Άνοιγμα Φακέλου
</button>

</div>


<div id="invite" class="invitation">

<h1>💍 Πρόσκληση</h1>

<p>Με μεγάλη χαρά σας προσκαλούμε</p>

<div class="names">
Δήμητρα & Γιάννης
</div>

<p>
στον γάμο μας και στη βάφτιση του γιου μας
<br>
<strong>Θοδωρής</strong>
</p>

<p>
Κυριακή 10 Ιουλίου 2026<br>
Ώρα 19:00
</p>

<div class="buttons">

<a href="https://maps.google.com">
<button class="map-btn">📍 Χάρτης</button>
</a>

<a href="iban.html">
<button class="gift-btn">🎁</button>
</a>

</div>

</div>


<script>

function openEnvelope(){

document.getElementById("start").classList.add("open");

setTimeout(()=>{

document.getElementById("start").style.display="none";
document.getElementById("invite").style.display="block";

startFlowers();

},800)

}

function startFlowers(){

setInterval(()=>{

let flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=3+Math.random()*5+"s";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),8000);

},400)

}

</script>

</body>
</html>
