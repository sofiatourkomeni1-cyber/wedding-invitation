<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Δήμητρα & Γιάννης</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
      background: linear-gradient(to bottom, #eef5ff, #dfeefe);
    }

    body.opened {
      overflow: auto;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.75), rgba(255,255,255,0.15) 40%, transparent 65%),
        linear-gradient(to bottom, #edf5ff 0%, #dcecff 100%);
    }

    .hint {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: #4e678a;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: 0.5px;
      z-index: 20;
      text-align: center;
      opacity: 1;
      transition: opacity 0.4s ease;
      padding: 0 16px;
    }

    .scene.open .hint {
      opacity: 0;
      pointer-events: none;
    }

    .envelope-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1600px;
      z-index: 5;
    }

    .envelope {
      position: relative;
      width: min(92vw, 980px);
      height: min(64vw, 660px);
      cursor: pointer;
      transform-style: preserve-3d;
    }

    .envelope-shadow {
      position: absolute;
      width: 82%;
      height: 40px;
      left: 50%;
      bottom: 5%;
      transform: translateX(-50%);
      background: rgba(64, 86, 125, 0.18);
      filter: blur(18px);
      border-radius: 50%;
      z-index: 1;
      transition: opacity 0.6s ease;
    }

    .envelope-back {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #e9d9bd 0%, #dcc39f 100%);
      border-radius: 18px;
      z-index: 2;
      overflow: hidden;
      box-shadow:
        0 20px 45px rgba(66, 58, 46, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .envelope-back::before,
    .envelope-back::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 50%;
      height: 72%;
      background: linear-gradient(to bottom, #e7d5b6, #d7bc95);
      z-index: 2;
    }

    .envelope-back::before {
      left: 0;
      clip-path: polygon(0 0, 100% 100%, 0 100%);
    }

    .envelope-back::after {
      right: 0;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .envelope-front {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58%;
      background: linear-gradient(to bottom, #e4cfab 0%, #d4b48b 100%);
      clip-path: polygon(0 0, 50% 72%, 100% 0, 100% 100%, 0 100%);
      z-index: 6;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
    }

    .flap {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 52%;
      background: linear-gradient(to bottom, #ecdcbf 0%, #d8bd96 100%);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top center;
      transform: rotateX(0deg);
      transition: transform 1.2s cubic-bezier(.2,.8,.2,1);
      z-index: 8;
      box-shadow: 0 6px 14px rgba(87, 72, 49, 0.12);
      backface-visibility: hidden;
    }

    .scene.open .flap {
      transform: rotateX(-178deg);
    }

    .invitation-card {
      position: absolute;
      left: 50%;
      bottom: 10%;
      transform: translateX(-50%) translateY(72%);
      width: min(78vw, 640px);
      max-height: 82vh;
      z-index: 4;
      opacity: 1;
      transition:
        transform 1.5s cubic-bezier(.2,.8,.2,1),
        box-shadow 1.2s ease;
      filter: drop-shadow(0 20px 30px rgba(43, 63, 103, 0.18));
      border-radius: 18px;
      pointer-events: none;
    }

    .scene.open .invitation-card {
      transform: translateX(-50%) translateY(-16%);
    }

    .card-image {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      border: 10px solid rgba(255,255,255,0.75);
      background: #fff;
    }

    .actions {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease 0.8s;
    }

    .scene.open ~ .actions,
    body.opened .actions {
      opacity: 1;
      pointer-events: auto;
    }

    .action-btn {
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      min-width: 58px;
      height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(41, 63, 95, 0.14);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      font-size: 24px;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(41, 63, 95, 0.18);
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 30;
    }

    .petal {
      position: absolute;
      top: -60px;
      font-size: 22px;
      opacity: 0.9;
      animation-name: fall;
      animation-timing-function: linear;
      animation-fill-mode: forwards;
      user-select: none;
      filter: drop-shadow(0 4px 8px rgba(54, 88, 148, 0.16));
    }

    @keyframes fall {
      0% {
        transform: translate3d(0, -60px, 0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--drift, 40px), 110vh, 0) rotate(360deg);
        opacity: 0.95;
      }
    }

    .iban-panel {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: min(90vw, 520px);
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(39, 57, 88, 0.22);
      z-index: 60;
      padding: 28px 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      text-align: center;
    }

    .iban-panel.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .iban-panel h2 {
      margin: 0 0 12px;
      color: #36507a;
      font-size: 34px;
    }

    .iban-panel p {
      margin: 0 0 10px;
      color: #5a6e8d;
      font-size: 22px;
    }

    .iban-value {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #f5f9ff;
      color: #30496f;
      font-size: 20px;
      word-break: break-word;
      border: 1px solid rgba(82, 117, 171, 0.16);
    }

    .close-iban {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: #e8f0fb;
      color: #35507a;
      font-size: 18px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .envelope {
        width: 100vw;
        height: 72vh;
      }

      .invitation-card {
        width: 88vw;
      }

      .scene.open .invitation-card {
        transform: translateX(-50%) translateY(-10%);
      }

      .hint {
        top: 22px;
        font-size: 26px;
      }

      .action-btn {
        width: 54px;
        height: 54px;
        min-width: 54px;
        font-size: 22px;
      }
    }

    @media (max-width: 480px) {
      .envelope {
        height: 68vh;
      }

      .invitation-card {
        width: 90vw;
      }

      .scene.open .invitation-card {
        transform: translateX(-50%) translateY(-6%);
      }

      .actions {
        bottom: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="scene" id="scene">
    <div class="hint" id="hint">Πάτησε στο κέντρο για να ανοίξει ο φάκελος</div>

    <div class="envelope-wrap">
      <div class="envelope" id="envelope" aria-label="Άνοιγμα πρόσκλησης">
        <div class="envelope-shadow"></div>
        <div class="envelope-back"></div>
        <div class="flap"></div>

        <div class="invitation-card">
          <img class="card-image" src="invitation.png" alt="Προσκλητήριο γάμου και βάφτισης">
        </div>

        <div class="envelope-front"></div>
      </div>
    </div>
  </div>

  <div class="petals" id="petals"></div>

  <div class="actions">
    <a class="action-btn" href="https://maps.google.com" target="_blank" aria-label="Χάρτης">📍</a>
    <button class="action-btn" id="giftBtn" aria-label="Δώρο">🎁</button>
  </div>

  <div class="iban-panel" id="ibanPanel">
    <h2>Δώρο</h2>
    <p>Μπορείς να χρησιμοποιήσεις το παρακάτω IBAN</p>
    <div class="iban-value">GR00 0000 0000 0000 0000 0000 000</div>
    <button class="close-iban" id="closeIban">Κλείσιμο</button>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const envelope = document.getElementById('envelope');
    const petalsContainer = document.getElementById('petals');
    const giftBtn = document.getElementById('giftBtn');
    const ibanPanel = document.getElementById('ibanPanel');
    const closeIban = document.getElementById('closeIban');

    let hasOpened = false;
    let petalsStarted = false;
    let petalsInterval = null;

    function openEnvelope() {
      if (hasOpened) return;

      hasOpened = true;
      scene.classList.add('open');
      document.body.classList.add('opened');

      setTimeout(() => {
        startPetals();
      }, 650);
    }

    function createPetal() {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.textContent = '🩵';

      const left = Math.random() * 100;
      const size = 14 + Math.random() * 18;
      const duration = 5 + Math.random() * 4;
      const drift = (-80 + Math.random() * 160) + 'px';

      petal.style.left = left + 'vw';
      petal.style.fontSize = size + 'px';
      petal.style.animationDuration = duration + 's';
      petal.style.setProperty('--drift', drift);

      petalsContainer.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, duration * 1000);
    }

    function startPetals() {
      if (petalsStarted) return;
      petalsStarted = true;

      for (let i = 0; i < 12; i++) {
        setTimeout(createPetal, i * 120);
      }

      petalsInterval = setInterval(createPetal, 320);
    }

    envelope.addEventListener('click', openEnvelope);

    giftBtn.addEventListener('click', () => {
      ibanPanel.classList.add('show');
    });

    closeIban.addEventListener('click', () => {
      ibanPanel.classList.remove('show');
    });

    ibanPanel.addEventListener('click', (e) => {
      if (e.target === ibanPanel) {
        ibanPanel.classList.remove('show');
      }
    });
  </script>
</body>
</html>
